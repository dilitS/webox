name: Feature request / RFC
description: Propose a new feature or significant change
title: "[feat]: "
labels: ["feature", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Webox follows a strict MVP scope. Please check [`docs/ROADMAP.md`](../docs/ROADMAP.md) and
        [`docs/PRD.md`](../docs/PRD.md) before proposing — your feature may already be planned for a later release.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you solving?
      description: Describe the user pain. **Don't** describe the solution yet.
    validations:
      required: true

  - type: textarea
    id: who
    attributes:
      label: Who experiences this problem?
      description: |
        Persona (solo dev / agency / freelancer / team), and how frequently they hit this.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: Optional. A sketch of how this could work. We may pick a different solution.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you think about? Why is this better?

  - type: dropdown
    id: scope
    attributes:
      label: Suggested release scope
      options:
        - v0.1 (MVP — likely already specified in PRD)
        - v0.2
        - v0.3+
        - v1.0+
        - Not sure
    validations:
      required: true

  - type: checkboxes
    id: confirm
    attributes:
      label: Pre-submit checklist
      options:
        - label: I checked `docs/ROADMAP.md` and `docs/PRD.md` and this is not already planned.
          required: true
        - label: I checked `docs/PRD.md §9 Non-goals` and this is not explicitly out of scope.
          required: true
