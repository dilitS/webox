name: Nightly E2E

# Webox nightly E2E run.
#
# Sprint 14 TASK-14.5 — `internal/e2e/...` is a teatest-driven harness
# that simulates multi-tick TUI flows (cockpit boot, host-key modal,
# trace emission, focus rotation). The CI loop runs the same package
# in `make test`, but on `main` we want a daily artefact + race run
# that cannot be skipped by a tired reviewer of an in-flight PR.
#
# Source of truth: docs/sprints/sprint-14-architecture-hardening.md
# (TASK-14.5 acceptance criteria).
#
# Action SHAs are pinned per `.cursor/rules/70-shell-and-workflow.mdc`.

on:
  schedule:
    # 03:13 UTC every day. Slightly off the hour to dodge the GitHub
    # peak-load slot at HH:00 — runs that start during the hour-mark
    # consistently get longer queue times in the public runner pool.
    - cron: "13 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  GOTELEMETRY: off

jobs:
  e2e:
    name: internal/e2e (race + verbose)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          check-latest: false
          cache: true
          cache-dependency-path: |
            go.sum
            tools/go.sum

      - name: Verify modules
        run: go mod verify

      - name: Run E2E suite (race + verbose)
        run: |
          go test -race -count=1 -v ./internal/e2e/... \
            | tee internal-e2e-output.txt

      - name: Upload nightly E2E log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-e2e-${{ github.run_id }}
          path: internal-e2e-output.txt
          if-no-files-found: error
          retention-days: 7
