name: CI

# Webox CI pipeline.
#
# Source of truth for which checks block merge:
#   docs/sprints/sprint-00-bootstrap.md TASK-00.4 + AGENTS.md §2.3.
# All third-party actions are pinned to a full commit SHA per
# `.cursor/rules/70-shell-and-workflow.mdc` (supply-chain hardening).
# Bumping: prefer Dependabot updates (.github/dependabot.yml) — it preserves
# the SHA-pin convention by rewriting `# vX.Y.Z` comments alongside the SHA.

on:
  pull_request:
    branches: [main]
  push:

# Least-privilege default. Individual jobs may opt into write scopes if
# strictly necessary — none of the current jobs do.
permissions:
  contents: read

# Cancel superseded PR runs to keep CI minutes bounded; let `push` to main
# always run to completion so release-trigger jobs (added later) never get
# preempted.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # Disable analytics on every Go invocation; CI must never phone home.
  GOTELEMETRY: off

jobs:
  lint:
    name: Lint (golangci-lint v2 + go vet)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          check-latest: false
          cache: true
          cache-dependency-path: |
            go.sum
            tools/go.sum

      - name: Cache golangci-lint analysis cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/golangci-lint
          key: golangci-lint-${{ runner.os }}-${{ hashFiles('.golangci.yml', 'tools/go.sum') }}
          restore-keys: |
            golangci-lint-${{ runner.os }}-

      - name: Run golangci-lint
        run: make lint

      - name: Run go vet
        run: make vet

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          check-latest: false
          cache: true
          cache-dependency-path: |
            go.sum
            tools/go.sum

      - name: Verify modules
        run: go mod verify

      - name: Run tests with race + coverage
        run: make test

      - name: Enforce coverage threshold
        run: make cover-check

      - name: Upload coverage profile
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ github.sha }}
          path: coverage.out
          if-no-files-found: error
          retention-days: 14

  vulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          check-latest: false
          cache: true
          cache-dependency-path: |
            go.sum
            tools/go.sum

      - name: Run govulncheck
        run: make vulncheck

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
          - runner: macos-latest
            goos: darwin
            goarch: amd64
          - runner: macos-latest
            goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          check-latest: false
          cache: true
          cache-dependency-path: |
            go.sum
            tools/go.sum

      # Keep TASK-00.4 focused on CI. GoReleaser-owned release packaging lands
      # in TASK-00.8; for now we enforce the promised cross-build matrix with
      # plain `go build`.
      - name: Cross-compile webox
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          MODULE: github.com/dilitS/webox
          VERSION: v0.0.0-ci
        run: |
          short_sha="${GITHUB_SHA::7}"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          out_dir="dist/webox_${GOOS}_${GOARCH}"
          out_bin="$out_dir/webox"
          mkdir -p "$out_dir"
          go build -trimpath \
            -ldflags "-s -w \
              -X ${MODULE}/internal/version.Version=${VERSION} \
              -X ${MODULE}/internal/version.Commit=${short_sha} \
              -X ${MODULE}/internal/version.Date=${build_date}" \
            -o "$out_bin" \
            ./cmd/webox
          test -f "$out_bin"

      - name: Smoke test native binary
        if: |
          (matrix.goos == 'linux' && runner.os == 'Linux' && matrix.goarch == 'amd64' && runner.arch == 'X64') ||
          (matrix.goos == 'darwin' && runner.os == 'macOS' && matrix.goarch == 'amd64' && runner.arch == 'X64') ||
          (matrix.goos == 'darwin' && runner.os == 'macOS' && matrix.goarch == 'arm64' && runner.arch == 'ARM64') ||
          (matrix.goos == 'linux' && runner.os == 'Linux' && matrix.goarch == 'arm64' && runner.arch == 'ARM64')
        run: |
          out_bin="dist/webox_${{ matrix.goos }}_${{ matrix.goarch }}/webox"
          "$out_bin" --version
          "$out_bin" --help

      - name: Smoke test unknown flag exit code 2 on native binary
        if: |
          (matrix.goos == 'linux' && runner.os == 'Linux' && matrix.goarch == 'amd64' && runner.arch == 'X64') ||
          (matrix.goos == 'darwin' && runner.os == 'macOS' && matrix.goarch == 'amd64' && runner.arch == 'X64') ||
          (matrix.goos == 'darwin' && runner.os == 'macOS' && matrix.goarch == 'arm64' && runner.arch == 'ARM64') ||
          (matrix.goos == 'linux' && runner.os == 'Linux' && matrix.goarch == 'arm64' && runner.arch == 'ARM64')
        shell: bash
        run: |
          set +e
          out_bin="dist/webox_${{ matrix.goos }}_${{ matrix.goarch }}/webox"
          "$out_bin" --not-a-flag
          rc=$?
          if [ "$rc" -ne 2 ]; then
            echo "::error::expected exit 2 for unknown flag, got $rc"
            exit 1
          fi

  # Sprint 20 added a tuistory-based PTY smoke harness that drives the actual
  # binary (no teatest mocking, no diff-rendering surprises). It is intentionally
  # NOT a required gate yet — and as of Sprint 21 it crashes reliably on the
  # GitHub-hosted `ubuntu-latest` runner with SIGILL ("Illegal instruction")
  # coming from `zigpty` (a Zig-built native node addon used by tuistory ≥ 0.8).
  # The prebuilt `zigpty.linux-x64.node` ships with a CPU baseline that the
  # current GHA runner kernel/CPU pair does not accept; the crash is therefore
  # an environmental incompatibility, not a Webox regression (cf. Copilot's
  # earlier mis-diagnosis blaming the Node version — irrelevant, since the
  # PTY backend is what dies). Until tuistory exposes a `node-pty` fallback
  # or zigpty publishes a more portable build, this job stays advisory: green
  # locally on macOS/Linux developer boxes, red on CI but `continue-on-error`
  # so it never blocks merges. Snapshot uploads remain useful for reviewers
  # who run the suite locally.
  smoke-tui:
    name: Smoke TUI (tuistory PTY)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          check-latest: false
          cache: true
          cache-dependency-path: |
            go.sum
            tools/go.sum

      # tuistory ships TS sources executed via Node's --experimental-strip-types,
      # which has been stable since Node 22.6 (kept on by default in 23+). Pin
      # to Node 22 LTS — it satisfies both the strip-types requirement and the
      # local Makefile guard, and keeps the runtime version consistent across
      # developer machines and CI.
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      # scripts/manual-test/.gitignore drops lock files on purpose (Sprint 20
      # carry-over: keep the harness self-contained). That means we cannot use
      # setup-node's npm cache here; the install is fast enough (~10s) without.
      - name: Install tuistory deps
        working-directory: scripts/manual-test
        run: npm install --no-audit --no-fund

      - name: Build webox binary (mock-friendly)
        env:
          CGO_ENABLED: "0"
        run: make build

      - name: Run smoke suite
        run: make smoke-test

      - name: Upload smoke report + snapshots
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smoke-tui-${{ github.sha }}
          path: docs/screenshots/sprint-20/manual/
          if-no-files-found: warn
          retention-days: 14

  ci-summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs: [lint, test, vulncheck, build]
    if: always()
    timeout-minutes: 2
    steps:
      - name: Verify required checks passed
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          TEST_RESULT: ${{ needs.test.result }}
          VULN_RESULT: ${{ needs.vulncheck.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          set -euo pipefail
          fail=0
          for kv in "lint:$LINT_RESULT" "test:$TEST_RESULT" \
                   "vulncheck:$VULN_RESULT" "build:$BUILD_RESULT"; do
            name="${kv%%:*}"
            result="${kv##*:}"
            if [ "$result" != "success" ]; then
              echo "::error::$name failed (result=$result)"
              fail=1
            else
              echo "✓ $name"
            fi
          done
          exit "$fail"
